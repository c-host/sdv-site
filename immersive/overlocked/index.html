<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDV - overlocked</title>
  <link rel="stylesheet" href="../../css/styles.css" />
</head>

<body>
  <section class="view view--immersive immersive-page" data-slug="overlocked">
    <nav class="immersive-nav">
      <a href="../../project/overlocked/" class="immersive-back-overview" aria-label="Back to project overview">←
        Overview</a>
    </nav>

    <div id="immersive-content" class="immersive-main" aria-label="Immersive content">
      <div class="immersive-inner" id="immersive-inner">
        <div class="immersive-flyer" data-flyer-root>
          <div class="immersive-flyer__viewport" role="application"
            aria-label="Archival scan on a mat: drag to pan. Hold Alt and drag to rotate freely. R resets rotation. Shift R snaps to nearest right angle. Alt+scroll or Alt plus minus resize scan. Magnifier follows the pointer. Shift+scroll lens size. Brackets resize lens.">
            <div class="immersive-flyer__loupe" hidden>
              <div class="immersive-flyer__loupe-disk">
                <div class="immersive-flyer__loupe-clip">
                  <div class="immersive-flyer__loupe-strip">
                    <img src="../../images/uploads/overlocked-scan-back.jpg" alt="" draggable="false" />
                  </div>
                </div>
              </div>
              <svg class="immersive-flyer__loupe-ring" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <circle cx="10" cy="10" r="5" fill="none" stroke="currentColor" stroke-width="1.5" />
                <path d="M14 14l5 5" fill="none" stroke="currentColor" stroke-width="1.5" />
              </svg>
            </div>
            <div class="immersive-flyer__stage">
              <div class="immersive-flyer__pan">
                <div class="immersive-flyer__sheet">
                  <figure class="immersive-flyer__figure">
                    <img class="immersive-flyer__img" src="../../images/uploads/overlocked-scan-back.jpg"
                      alt="Archival scan, overlocked" draggable="false" />
                  </figure>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <button type="button" class="immersive-abstraction-btn" id="abstraction-btn"
      aria-label="Abstract view (inset + captions)">
      <svg class="icon-abstraction" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 4h16v16H4z" />
        <path d="M9 9h6v6H9z" />
      </svg>
    </button>

    <div class="abstraction-backdrop" id="abstraction-backdrop" hidden aria-hidden="true">
      <img id="abstraction-backdrop-img" src="" alt="" />
      <video id="abstraction-backdrop-video" class="abstraction-backdrop-video" autoplay loop muted playsinline
        aria-hidden="true"></video>
    </div>
    <button type="button" class="immersive-abstraction-btn backdrop-zoom-btn" id="backdrop-zoom-btn" hidden
      aria-label="Zoom into this project">
      <svg class="icon-abstraction icon-magnifier" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.5">
        <circle cx="10" cy="10" r="5" />
        <path d="M14 14l5 5" />
      </svg>
    </button>

    <div class="immersive-abstraction" id="immersive-abstraction" aria-hidden="true">
      <div class="abstraction-inset" id="abstraction-inset">
        <div class="immersive-inner" id="immersive-inner-inset">
          <div class="immersive-flyer" data-flyer-root>
            <div class="immersive-flyer__viewport" role="application"
              aria-label="Archival scan on a mat: drag to pan. Hold Alt and drag to rotate freely. R resets rotation. Shift R snaps to nearest right angle. Alt+scroll or Alt plus minus resize scan. Magnifier follows the pointer. Shift+scroll lens size. Brackets resize lens.">
              <div class="immersive-flyer__loupe" hidden>
                <div class="immersive-flyer__loupe-disk">
                  <div class="immersive-flyer__loupe-clip">
                    <div class="immersive-flyer__loupe-strip">
                      <img src="../../images/uploads/overlocked-scan-back.jpg" alt="" draggable="false" />
                    </div>
                  </div>
                </div>
                <svg class="immersive-flyer__loupe-ring" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <circle cx="10" cy="10" r="5" fill="none" stroke="currentColor" stroke-width="1.5" />
                  <path d="M14 14l5 5" fill="none" stroke="currentColor" stroke-width="1.5" />
                </svg>
              </div>
              <div class="immersive-flyer__hud" aria-hidden="true">
                <p class="immersive-flyer__hud-hint">Drag to pan · Alt+drag: rotate · Alt+scroll or Alt±: scan size · R:
                  reset
                  angle · Shift+R: snap 90° · Shift+scroll: lens size · [ ] lens</p>
              </div>
              <div class="immersive-flyer__stage">
                <div class="immersive-flyer__pan">
                  <div class="immersive-flyer__sheet">
                    <figure class="immersive-flyer__figure">
                      <img class="immersive-flyer__img" src="../../images/uploads/overlocked-scan-back.jpg"
                        alt="Archival scan, overlocked" draggable="false" />
                    </figure>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="abstraction-caption-single" id="abstraction-caption-single">
        <button type="button" class="caption-current" id="caption-current" aria-label="View project"></button>
      </div>
    </div>
  </section>

  <script src="../../js/sdv-shared.js"></script>
  <script src="../../js/content-loader.js"></script>
  <script src="../../js/app.js"></script>
</body>

</html>
