<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDV - Artist Profile</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <section class="view view--home is-home-idle">
    <div class="home-sdv-mark" aria-hidden="true">SDV</div>
    <a href="info/" class="home-info-link" aria-label="Bio, links, and CV">ⓘ</a>
    <div class="home-material-filter" id="home-material-filter" aria-label="Materials" aria-live="polite"></div>
    <div class="home-line home-line--vertical" aria-hidden="true"></div>
    <div class="home-line home-line--horizontal" aria-hidden="true"></div>
    <div class="home-main">
      <nav class="home-projects" aria-label="Projects"></nav>
      <div class="home-center">
        <div class="home-image-wrap">
          <div class="home-idle-title" aria-hidden="true">Stacy de Voe</div>
          <img id="home-project-image" alt="" hidden />
        </div>
        <button type="button" class="home-zoom-btn" aria-label="Open selected project" title="Open selected project">
          <svg class="icon-magnifier" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="7" />
            <path d="m21 21-4.35-4.35" />
          </svg>
        </button>
      </div>
    </div>
  </section>
  <script src="js/sdv-shared.js"></script>
  <script src="js/content-loader.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
