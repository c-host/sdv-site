header_title: Under the Needle's Eye

overview_markdown: |
  A lost textile industry forms the departing point of Stacey de Voe's exhibition **Under the Needle's Eye** (Under nålens öga). In Kürzel's Factory (1896-1955), where Skånes konstförening’s premises are located, worked spinners, dyers, and weavers; union representatives; and managers. de Voe engages with the context and develops site-specific works that stage the memory of the locale as an intricate supervisor and a world dressed in tartan and duvetyne.

  A 200 kg iron gate has been brought to the exhibition. Richly ornamented with twisting, sharp foliage, once closed off the factory area from Ystadsvägen. Otherwise, there are only a few remaining traces in the archive. Brief statements in the union's protocols provide some insights: someone lost an eye at a machine, another was punished for wearing the wrong coat, a third was fired after breaking a needle in machinery. The 50th anniversary book *Warp and Weft* (Varp och väft) from 1946 shows the management's gaze on the factory's achievements and how the worker's vacations as well as leisure activities were organized.

  The limited sources give way to fiction and the historical materials are allowed to take on new forms. The video essay *Revised edition* (2024) - composed as an inverted silent film that emphasizes text rather than image - modulates the language of the anniversary book, sampling images of daily life at the factory and stories of workplace incidents. The work does not reconstruct a historical event. Instead, with the distance of time, a new narrative emerges: that of the memory of modernity, of workers under an ever-watchful eye and of weaving witches.

  The payrolls, reproduced for the exhibition as graphic prints, show the factory's production line with some thirty positions with different salaries in a gender-coded hierarchy. The list appears as the spine of the factory building; a chain of interconnected bodies that transformed raw material into thread, textile and product.

  Kürzel's produced textiles to make garments, but in this exhibition it is the body of the building that is being dressed and draped. In the large gallery, de Voe has departed from one of the factory's tartan patterns. It has been enlarged, distorted and printed on textiles that seals and accentuates the architecture under which the labor took place. The duvetyne draping the small gallery, also known as molton, is mostly used today to darken and soundproof art galleries and theaters and the heavy textile has thus never left the building.

  The textiles, objects, images and words act as citations in an incomplete story of a bygone place, shaped by de Voe's own experiences from the textile industry. But between the lines, a neglected part of the city of Malmö's history emerges. Under the Needle's Eye provokes reflections between an industrial memory and contemporary labor politics through a story that gives voice to the building and body to the memory.

  **Text by** Albin Hillervik

