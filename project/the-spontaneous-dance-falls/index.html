<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDV - The Spontaneous Dance Falls</title>
  <link rel="stylesheet" href="../../css/styles.css" />
</head>

<body>
  <section class="view view--project">
    <a href="../../" class="project-back" aria-label="Back to home">←</a>
    <div class="project-split" id="project-split">
      <div class="project-pane project-pane--text">
        <div class="project-scroll">
          <h2 id="overview-title"></h2>
          <div id="project-overview-text"></div>
          <div id="project-materials"></div>
          <div id="project-links"></div>
        </div>
      </div>
      <div class="project-pane project-pane--images">
        <div class="project-scroll project-images" id="project-gallery">
          <div class="project-timeline-wrap">
            <div id="project-timeline" class="project-timeline" aria-label="Fall timeline"></div>
            <div id="project-fall-meta" class="project-fall-meta" aria-hidden="true"></div>
          </div>
          <div id="project-gallery-panels" class="project-gallery-panels"></div>
        </div>
      </div>

      <div class="project-zoom-wrap">
        <div class="project-zoom-controls" aria-label="Resize split view">
          <button type="button" class="project-zoom-shift project-zoom-shift--up" data-split-shift="up"
            aria-label="Focus text">
            <svg class="project-zoom-shift-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="1.5">
              <path d="M7 14l5-5 5 5" />
            </svg>
          </button>
          <a class="project-zoom-btn" href="../../immersive/the-spontaneous-dance-falls/" aria-label="Immersive view">
            <svg class="icon-magnifier" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="11" cy="11" r="7" />
              <path d="m21 21-4.35-4.35" />
            </svg>
          </a>
          <button type="button" class="project-zoom-shift project-zoom-shift--down" data-split-shift="down"
            aria-label="Focus images">
            <svg class="project-zoom-shift-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="1.5">
              <path d="M7 10l5 5 5-5" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </section>

  <script src="../../js/content-loader.js"></script>
  <script src="../../js/app.js"></script>
</body>

</html>
