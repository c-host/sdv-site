backend:
  name: git-gateway
  branch: main

# Local backend for development
# local_backend: true

# Safer editing: saves drafts first, then explicit Publish.
publish_mode: editorial_workflow

# Store and reference media relative to the site's `images/` directory.
# This allows projects to use paths like `project-overviews/...` and `uploads/...`
# while still resolving correctly on the live site as `/images/<path>`.
media_folder: "images"
public_folder: "/images"

site_url: "https://unrivaled-pasca-4201ab.netlify.app"
display_url: "unrivaled-pasca-4201ab.netlify.app"

collections:
  - name: "info"
    label: "Info page"
    files:
      - label: "Info page"
        name: "info"
        file: "content/info.md"
        fields:
          - label: "Bio"
            name: "body"
            widget: "markdown"
            required: true
            hint: "Main bio text shown on the Info page."
            modes: ["rich_text"]
            buttons:
              - bold
              - italic
              - strikethrough
              - link
              - quote
              - bulleted-list
              - numbered-list
            editor_components: []

          - label: "Press"
            name: "press"
            widget: "list"
            required: false
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "URL"
                name: "url"
                widget: "string"
                required: false
                hint: "Optional. Must start with https:// (recommended) or http://"
                pattern: ["^https?://.+", "Must start with http:// or https://"]
              - {
                  label: "Description",
                  name: "description",
                  widget: "text",
                  required: false,
                }
          - label: "CV"
            name: "cv"
            widget: "object"
            fields:
              - {
                  label: "Link label",
                  name: "label",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "PDF file",
                  name: "file",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "URL (optional)",
                  name: "url",
                  widget: "string",
                  required: false,
                  hint: "Optional. If used, must start with https:// (recommended) or http://",
                  pattern:
                    ["^https?://.+", "Must start with http:// or https://"],
                }

  - name: "captions"
    label: "Captions"
    files:
      - label: "Captions"
        name: "captions"
        file: "content/captions.yml"
        fields:
          - label: "Captions"
            name: "captions"
            widget: "list"
            fields:
              - label: "Project"
                name: "project"
                widget: "select"
                options:
                  - {
                      label: "The Spontaneous Dance Falls",
                      value: "the-spontaneous-dance-falls",
                    }
                  - {
                      label: "Under the Needle's Eye",
                      value: "under-the-needles-eye",
                    }
                  - { label: "Overlocked", value: "overlocked" }
              - { label: "Text", name: "text", widget: "string" }

  - name: "projects"
    label: "Projects"
    files:
      - label: "The Spontaneous Dance Falls"
        name: "project1"
        file: "content/projects/the-spontaneous-dance-falls.yml"
        fields:
          - {
              label: "Enable immersive link (magnifier on overview page)",
              name: "immersive_enabled",
              widget: "boolean",
              default: true,
              hint: "Only turn on if there is an immersive page built for the project.",
            }
          - label: "Home materials (select for home page material icons)"
            name: "home_materials"
            widget: "list"
            required: false
            hint: "Select which material icons will be shown on home page for this project."
            field:
              label: "Material Icon (home)"
              name: "material"
              widget: "select"
              options:
                - { label: "A/V", value: "A/V" }
                - { label: "Archive", value: "Archive" }
                - { label: "Glass", value: "Glass" }
                - { label: "Metal", value: "Metal" }
                - { label: "Objects", value: "Objects" }
                - { label: "Performance", value: "Performance" }
                - { label: "Synthetic", value: "Synthetic" }
                - { label: "Textile", value: "Textile" }
          - {
              label: "Project title",
              name: "header_title",
              widget: "string",
              required: true,
            }
          - label: "Overview"
            name: "overview_markdown"
            widget: "markdown"
            modes: ["raw"]
            buttons:
              - bold
              - italic
              - strikethrough
              - link
              - quote
              - bulleted-list
              - numbered-list
            editor_components: []
          - label: "Material List (overview text)"
            name: "materials_markdown"
            widget: "markdown"
            required: false
            modes: ["raw"]
            buttons:
              - bold
              - italic
              - strikethrough
              - link
              - quote
              - bulleted-list
              - numbered-list
            editor_components: []
          - label: "Links"
            name: "links"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - label: "URL"
                name: "url"
                widget: "string"
                required: false
                hint: "Must start with https:// (recommended) or http://"
                pattern: ["^https?://.+", "Must start with http:// or https://"]
          - label: "Falls (timeline panels)"
            name: "falls"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - {
                  label: "Type",
                  name: "type",
                  widget: "string",
                  required: false,
                }
              - label: "Images"
                name: "images"
                widget: "list"
                field:
                  label: "Image"
                  name: "image"
                  widget: "image"
                  media_folder: "/images/project-overviews/the-spontaneous-dance-falls"
                  public_folder: "/images/project-overviews/the-spontaneous-dance-falls"

