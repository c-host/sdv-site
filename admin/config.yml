backend:
  name: git-gateway
  branch: main

# Safer editing: saves drafts first, then explicit Publish.
publish_mode: editorial_workflow

media_folder: "images/uploads"
# Many existing content files store paths like `images/...` already.
# Using a root public folder ensures the CMS previews those correctly.
public_folder: "/"

site_url: "https://unrivaled-pasca-4201ab.netlify.app"
display_url: "unrivaled-pasca-4201ab.netlify.app"

collections:
  - name: "info"
    label: "Info page"
    files:
      - label: "Info page (edit this)"
        name: "info"
        file: "content/info.yml"
        fields:
          - label: "Read this first"
            name: "client_help"
            widget: "text"
            required: false
            default: |
              Quick guide (please read):
              - Save: saves a draft (not live yet).
              - Review / Ready: creates a preview link so you can see the real website before publishing.
              - Publish: makes changes live on the website (usually updates within 1–2 minutes).

              Previewing your changes (recommended):
              1) Click Save.
              2) Move the entry to Review / Ready.
              3) Open the “Deploy Preview” link and check everything looks right.
              4) Publish when you’re happy.

              Live site: https://unrivaled-pasca-4201ab.netlify.app/

              If anything looks wrong, do not delete your text—click Cancel and ask for help.
            hint: "This is just guidance inside the CMS; you can leave it as-is."

          - label: "Bio"
            name: "bio_markdown"
            widget: "markdown"
            required: true
            hint: "Main bio text shown on the Info page. Keep at least a few paragraphs."

          - label: "Press"
            name: "press"
            widget: "list"
            required: false
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "URL", name: "url", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: false }
          - label: "CV"
            name: "cv"
            widget: "object"
            fields:
              - { label: "Link label", name: "label", widget: "string", required: false }
              - { label: "PDF file", name: "file", widget: "string", required: false }
              - { label: "URL (optional)", name: "url", widget: "string", required: false }

  - name: "captions"
    label: "Captions (Abstraction Mode)"
    files:
      - label: "Captions"
        name: "captions"
        file: "content/captions.yml"
        fields:
          - label: "Captions"
            name: "captions"
            widget: "list"
            fields:
              - { label: "Project", name: "project", widget: "number", min: 1, max: 3 }
              - { label: "Text", name: "text", widget: "string" }

  - name: "projects"
    label: "Projects"
    files:
      - label: "Project 1"
        name: "project1"
        file: "content/projects/the-spontaneous-dance-falls.yml"
        fields:
          - { label: "HTML title (browser tab)", name: "page_title", widget: "string", required: false }
          - { label: "Header title (page H2)", name: "header_title", widget: "string", required: false }
          - { label: "Title (legacy fallback)", name: "title", widget: "string" }
          - { label: "Overview", name: "overview_markdown", widget: "markdown" }
          - label: "Materials (structured, for filters/icons)"
            name: "materials"
            widget: "list"
            required: false
            field: { label: "Material", name: "material", widget: "string" }
          - label: "Home materials (curated categories)"
            name: "home_materials"
            widget: "list"
            required: false
            field: { label: "Material (home)", name: "material", widget: "string" }
          - { label: "Materials", name: "materials_markdown", widget: "markdown", required: false }
          - { label: "Enable immersive link (magnifier on overview page)", name: "immersive_enabled", widget: "boolean", default: true }
          - label: "Falls (timeline panels)"
            name: "falls"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Type (hover)", name: "type", widget: "string", required: false }
              - { label: "Details (hover)", name: "details", widget: "text", required: false }
              - label: "Images"
                name: "images"
                widget: "list"
                field: { label: "Image", name: "image", widget: "image" }

      - label: "Project 2"
        name: "project2"
        file: "content/projects/under-the-needles-eye.yml"
        fields:
          - { label: "HTML title (browser tab)", name: "page_title", widget: "string", required: false }
          - { label: "Header title (page H2)", name: "header_title", widget: "string", required: false }
          - { label: "Title (legacy fallback)", name: "title", widget: "string" }
          - { label: "Overview", name: "overview_markdown", widget: "markdown" }
          - label: "Materials (structured, for filters/icons)"
            name: "materials"
            widget: "list"
            required: false
            field: { label: "Material", name: "material", widget: "string" }
          - label: "Home materials (curated categories)"
            name: "home_materials"
            widget: "list"
            required: false
            field: { label: "Material (home)", name: "material", widget: "string" }
          - { label: "Materials (overview section)", name: "materials_markdown", widget: "markdown", required: false }
          - { label: "Enable immersive link (magnifier on overview page)", name: "immersive_enabled", widget: "boolean", default: true }
          - label: "Links"
            name: "links"
            widget: "list"
            required: false
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Gallery images"
            name: "gallery"
            widget: "list"
            field: { label: "Image", name: "image", widget: "image" }

      - label: "Project 3"
        name: "project3"
        file: "content/projects/overlocked.yml"
        fields:
          - { label: "HTML title (browser tab)", name: "page_title", widget: "string", required: false }
          - { label: "Header title (page H2)", name: "header_title", widget: "string", required: false }
          - { label: "Title (legacy fallback)", name: "title", widget: "string" }
          - { label: "Overview", name: "overview_markdown", widget: "markdown" }
          - label: "Materials (structured, for filters/icons)"
            name: "materials"
            widget: "list"
            required: false
            field: { label: "Material", name: "material", widget: "string" }
          - label: "Home materials (curated categories)"
            name: "home_materials"
            widget: "list"
            required: false
            field: { label: "Material (home)", name: "material", widget: "string" }
          - { label: "Materials (overview section)", name: "materials_markdown", widget: "markdown", required: false }
          - { label: "Enable immersive link (magnifier on overview page)", name: "immersive_enabled", widget: "boolean", default: true }
          - label: "Gallery images"
            name: "gallery"
            widget: "list"
            field: { label: "Image", name: "image", widget: "image" }

